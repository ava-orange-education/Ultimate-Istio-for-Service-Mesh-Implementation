apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: kiali-viewer
rules:
  - apiGroups: ["", "apps", "networking.istio.io"]
    resources: ["pods", "services", "deployments", "virtualservices", "destinationrules"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kiali-viewer-binding
  namespace: default
subjects:
  - kind: User
    name: developer-user
roleRef:
  kind: Role
  name: kiali-viewer
  apiGroup: rbac.authorization.k8s.io
